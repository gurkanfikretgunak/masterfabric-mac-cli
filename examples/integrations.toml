# MasterFabric notification integrations
# Copy keys into ~/.config/masterfabric/config.toml (or: mf config init && mf config set …)

[integrations.slack]
enabled = true
webhook_url = "https://hooks.slack.com/services/T00/B00/XXXX"

[integrations.telegram]
enabled = true
bot_token = "123456:ABC-DEF"
chat_id = "123456789"

# provider: smtp | resend | mailgun
[integrations.mail]
enabled = true
provider = "resend"
from = "alerts@example.com"
to = "you@example.com"
subject_prefix = "[MasterFabric]"
api_key = "re_xxx"
# mailgun_domain = "mg.example.com"
# smtp_host = "smtp.example.com"
# smtp_port = 587
# smtp_username = "user"
# smtp_password = "secret"
# smtp_use_tls = true
